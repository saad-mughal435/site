<body class="marsad">

<div class="mrs-console">
  <div class="mrs-topbar">
    <a class="mrs-brand" href="index.html"><span class="mrs-brand-mark">M</span> Marsad</a>
    <nav class="mrs-topbar-nav">
      <a href="console.html" class="is-active">Console</a>
      <a href="driver.html">Driver</a>
      <a href="admin.html">Admin</a>
    </nav>
    <div class="mrs-topbar-spacer"></div>
    <button class="mrs-btn mrs-btn--sm" id="ai-chat" title="AI dispatcher copilot">✦ Copilot</button>
    <span class="mrs-mode-badge" id="mode-badge">…</span>
  </div>

  <div class="mrs-kpi-strip" id="kpi-strip"></div>

  <main class="mrs-map-wrap">
    <div id="console-map" class="mrs-map"></div>
  </main>

  <aside class="mrs-side">
    <div class="mrs-side-tabs">
      <button class="active" data-tab="queue">Order queue</button>
      <button data-tab="drivers">Drivers</button>
    </div>
    <div class="mrs-side-body" id="queue"></div>
    <div class="mrs-side-body" id="drivers" style="display:none;"></div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script src="js/map.js?v=20260521a"></script>
<script src="js/console.js?v=20260521a"></script>
<script>
  // Side tab toggle (queue vs drivers)
  document.querySelectorAll('.mrs-side-tabs button').forEach(function (b) {
    b.addEventListener('click', function () {
      document.querySelectorAll('.mrs-side-tabs button').forEach(function (x) { x.classList.toggle('active', x === b); });
      var t = b.getAttribute('data-tab');
      document.getElementById('queue').style.display   = t === 'queue'   ? '' : 'none';
      document.getElementById('drivers').style.display = t === 'drivers' ? '' : 'none';
    });
  });
</script>
