<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fdfaf6" />
<title>Shop - Pebble &amp; Co.</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f15a3a'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23fdfaf6'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/shop.css" />
</head>
<body>

<div id="nav-host"></div>

<main>
  <section class="container" style="padding-top:48px;">
    <div class="catalog-head">
      <div>
        <h1 id="catalog-heading" style="font-size:clamp(28px,3.6vw,40px);">All products</h1>
        <p class="catalog-count" id="catalog-count">Loading...</p>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <label style="font-size:13px; color:var(--ink-soft);">Sort by</label>
        <select class="sort-select" id="sort-select">
          <option value="newest">Newest</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top rated</option>
        </select>
      </div>
    </div>
  </section>

  <section class="container">
    <div class="catalog-layout">
      <aside class="filters" id="filters"></aside>
      <div id="catalog-grid" class="product-grid"></div>
    </div>
  </section>
</main>

<div id="footer-host"></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script src="js/storefront.js"></script>
<script>window.bootstrapShell('shop');</script>

</body>
</html>
