<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1a1815" />
<title>Admin - Pebble &amp; Co.</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1815'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23f15a3a'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/shop.css" />
</head>
<body class="admin-body">

<div class="admin-app">

  <aside class="admin-sidebar" id="admin-sidebar">
    <a href="admin.html" class="admin-brand">
      <span class="brand-dot"></span>
      <span>Pebble Admin</span>
    </a>
    <nav class="admin-nav" id="admin-nav"></nav>
    <div class="admin-side-bottom">
      <a href="index.html" class="admin-side-back">← Back to storefront</a>
      <div class="admin-build">v1.4 demo &middot; mock</div>
    </div>
  </aside>

  <div class="admin-shell">
    <header class="admin-topbar">
      <button class="admin-burger" id="admin-burger" aria-label="Menu">☰</button>
      <div class="admin-search">
        <input type="text" placeholder="Search orders, products, customers..." id="admin-search">
      </div>
      <div class="admin-top-actions">
        <button class="admin-bell" id="admin-bell" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 8a6 6 0 1 1 12 0c0 7 3 8 3 8H3s3-1 3-8"/>
            <path d="M10 21a2 2 0 0 0 4 0"/>
          </svg>
          <span class="admin-bell-count" id="admin-bell-count" hidden>0</span>
        </button>
        <div class="admin-bell-panel" id="admin-bell-panel" hidden>
          <div class="admin-bell-head">
            <strong>Notifications</strong>
            <button class="btn-link" id="bell-mark-read">Mark all read</button>
          </div>
          <div class="admin-bell-list" id="admin-bell-list"></div>
        </div>
        <div class="admin-avatar">DA</div>
      </div>
    </header>

    <main class="admin-main" id="admin-main">
      <div style="padding:80px 0; text-align:center; color:var(--ink-soft);">Loading dashboard...</div>
    </main>
  </div>
</div>

<script src="js/data.js?v=20260514-2"></script>
<script src="js/mock-api.js?v=20260514-2"></script>
<script src="js/app.js?v=20260514-2"></script>
<script src="js/admin-sections.js?v=20260514-2"></script>
<script src="js/admin.js?v=20260514-2"></script>
<script src="js/notifications.js?v=20260514-2"></script>

</body>
</html>
