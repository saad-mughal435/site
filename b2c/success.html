<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fdfaf6" />
<title>Order placed - Pebble &amp; Co.</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f15a3a'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23fdfaf6'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/shop.css" />
</head>
<body>

<div id="nav-host"></div>

<main>
  <section class="container" style="padding:60px 0;">
    <div id="success-root">
      <div style="padding:60px 0; text-align:center; color:var(--ink-soft);">Loading...</div>
    </div>
  </section>
</main>

<div id="footer-host"></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script>
(function () {
  'use strict';
  document.addEventListener('DOMContentLoaded', init);

  async function init() {
    const root = document.getElementById('success-root');
    const orderId = new URLSearchParams(window.location.search).get('order');

    if (!orderId) {
      root.innerHTML = `
        <div style="text-align:center; padding:40px 20px;">
          <h2>No order to show.</h2>
          <p style="margin:12px 0 24px; color:var(--ink-soft);">Head back to the shop and place a demo order.</p>
          <a href="index.html" class="btn btn-primary btn-lg">Go to shop</a>
        </div>`;
      return;
    }

    const order = await fetch('/b2c/api/orders/' + encodeURIComponent(orderId)).then(r => r.ok ? r.json() : null);
    if (!order) {
      root.innerHTML = `<div style="text-align:center; padding:40px 20px;">
        <h2>We couldn't find that order.</h2>
        <a href="index.html" class="btn btn-primary" style="margin-top:18px;">Back to shop</a>
      </div>`;
      return;
    }

    const eta = new Date(order.eta);
    const etaStr = eta.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });

    root.innerHTML = `
      <div class="success-hero">
        <div class="success-check" aria-hidden="true">
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="30" fill="none" stroke="currentColor" stroke-width="2.5" class="success-circle"/>
            <path d="M18 32 l10 10 l18 -20" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="success-tick"/>
          </svg>
        </div>
        <h1>Thank you, ${esc((order.shipping?.first_name) || 'friend')}.</h1>
        <p class="success-sub">
          Your demo order <strong>${order.id}</strong> has been placed.<br>
          A confirmation email <em>would</em> arrive at <strong>${esc(order.shipping?.email || '')}</strong> if this were a real shop.
        </p>
        <p class="success-eta">Estimated delivery: <strong>${etaStr}</strong></p>

        <div class="success-cta">
          <a href="index.html" class="btn btn-primary btn-lg">Keep shopping</a>
          <a href="account.html" class="btn btn-ghost btn-lg">View order history</a>
        </div>
      </div>

      <div class="success-grid container">
        <div class="success-card">
          <h3>Order summary</h3>
          <div class="success-lines">
            ${order.lines.map(l => `
              <div class="success-line">
                <div class="success-line-image">${window.makeProductSvg(l.product, { k: 0 })}<span>${l.qty}</span></div>
                <div class="success-line-body">
                  <div class="success-line-name">${esc(l.product.name)}</div>
                  ${l.variant_name ? `<div class="success-line-variant">${esc(l.variant_name)}</div>` : ''}
                </div>
                <div class="success-line-price">${window.formatMoney(l.line_total)}</div>
              </div>
            `).join('')}
          </div>

          <div style="border-top:1px solid var(--line); margin:14px 0;"></div>

          <div class="summary-row"><span>Subtotal</span><span>${window.formatMoney(order.subtotal)}</span></div>
          ${order.discount > 0 ? `<div class="summary-row discount"><span>Discount</span><span>- ${window.formatMoney(order.discount)}</span></div>` : ''}
          <div class="summary-row"><span>Shipping</span><span>${order.shipping_cost === 0 ? 'Free' : window.formatMoney(order.shipping_cost)}</span></div>
          <div class="summary-row"><span>Tax</span><span>${window.formatMoney(order.tax)}</span></div>
          <div class="summary-row total"><span>Total</span><span>${window.formatMoney(order.total)}</span></div>
        </div>

        <div class="success-card">
          <h3>Shipping to</h3>
          <p>${esc([order.shipping.first_name, order.shipping.last_name].filter(Boolean).join(' ') || order.customer_name || '')}</p>
          <p>${esc(order.shipping.address1 || order.shipping.line1 || '')}${order.shipping.address2 ? ', ' + esc(order.shipping.address2) : ''}</p>
          <p>${esc(order.shipping.city || '')}${order.shipping.state ? ', ' + esc(order.shipping.state) : ''} ${esc(order.shipping.postal || order.shipping.zip || '')}</p>
          <p>${esc(order.shipping.country || '')}</p>
          <p style="margin-top:10px; color:var(--ink-soft); font-size:13px;">${esc(order.shipping.email || order.customer_email || '')}</p>

          <h3 style="margin-top:22px;">Payment</h3>
          <p>${order.payment.kind === 'card'
                ? `Card ending in ${esc(order.payment.last4 || '••••')}`
                : order.payment.kind === 'paypal' ? 'PayPal'
                : 'Cash on delivery'}</p>

          <h3 style="margin-top:22px;">Status</h3>
          <div class="status-timeline">
            <div class="status-step done">
              <div class="status-dot"></div>
              <div><strong>Order placed</strong><div class="status-time">Just now</div></div>
            </div>
            <div class="status-step">
              <div class="status-dot"></div>
              <div><strong>Packed</strong><div class="status-time">In 1-2 business days</div></div>
            </div>
            <div class="status-step">
              <div class="status-dot"></div>
              <div><strong>Shipped</strong><div class="status-time">With tracking</div></div>
            </div>
            <div class="status-step">
              <div class="status-dot"></div>
              <div><strong>Delivered</strong><div class="status-time">~${etaStr}</div></div>
            </div>
          </div>
        </div>
      </div>

      <div style="text-align:center; margin-top:40px; padding:20px; background:var(--surface-2); border-radius:var(--radius); max-width:760px; margin-left:auto; margin-right:auto;">
        <p style="font-size:13.5px; color:var(--ink-soft);">
          This is a portfolio demo for <strong>Saad Mughal</strong>. No card was charged, no order will ship, no email has been sent.
          The same architecture (storefront + cart + multi-step checkout + admin) can be wired to a real backend.
        </p>
      </div>
    `;
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
<script>window.bootstrapShell('shop');</script>

</body>
</html>
