<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Terminal - Qahwa POS</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#1a1410" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%231a1410'/%3E%3Ctext%20x%3D'50%25'%20y%3D'58%25'%20font-family%3D'serif'%20font-weight%3D'700'%20font-size%3D'30'%20fill%3D'%23d4a574'%20text-anchor%3D'middle'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/pos.css?v=20260516a" />
</head>
<body class="pos">

<div class="pos-terminal" id="terminal" style="display:none;">
  <!-- Left: products -->
  <div class="pos-terminal-side">
    <div class="pos-topbar">
      <a class="pos-topbar-brand" href="index.html"><span class="pos-topbar-mark">Q</span> Qahwa POS</a>
      <div class="pos-topbar-user">
        <span class="pos-topbar-user-pill" id="t-user">—</span>
        <button class="pos-btn pos-btn--ghost" id="t-logout" style="padding:6px 12px;min-height:36px;font-size:12px;">Lock</button>
      </div>
    </div>
    <div class="pos-cats" id="t-cats"></div>
    <div class="pos-search-row"><input class="pos-input" id="t-search" placeholder="Search product..."/></div>
    <div class="pos-products" id="t-products"></div>
  </div>

  <!-- Right: cart -->
  <div class="pos-cart">
    <div class="pos-cart-head">
      <h3 id="t-order-no">—</h3>
      <span class="pos-cart-type-pill" id="t-order-type">Takeaway</span>
      <span class="pos-cart-head-meta" id="t-order-meta">—</span>
    </div>
    <div class="pos-cart-lines" id="t-cart-lines">
      <div class="pos-cart-empty">
        <div class="pos-cart-empty-mark">☕</div>
        Tap a product to start the order.
      </div>
    </div>
    <div class="pos-cart-summary">
      <div class="pos-cart-sum-row"><span>Subtotal</span><span id="t-subtotal">AED 0.00</span></div>
      <div class="pos-cart-sum-row discount" id="t-disc-row" style="display:none;"><span>Discount</span><span id="t-discount">-AED 0.00</span></div>
      <div class="pos-cart-sum-row"><span>VAT (5%)</span><span id="t-vat">AED 0.00</span></div>
      <div class="pos-cart-sum-row pos-cart-sum-total"><span>Total</span><span class="num" id="t-total">AED 0.00</span></div>
    </div>
    <div class="pos-cart-actions">
      <button class="pos-cart-action" id="t-cash"><span>💵</span><span>Cash</span></button>
      <button class="pos-cart-action" id="t-card"><span>💳</span><span>Card</span></button>
      <button class="pos-cart-action" id="t-split"><span>🔀</span><span>Split</span></button>
      <button class="pos-cart-action" id="t-discount-btn"><span>%</span><span>Discount</span></button>
      <button class="pos-cart-action" id="t-hold"><span>⏸</span><span>Hold</span></button>
      <button class="pos-cart-action" id="t-void"><span>✕</span><span>Void</span></button>
      <button class="pos-cart-action kot" id="t-kot"><span>🔔</span><span>Send to Kitchen</span></button>
    </div>
  </div>
</div>

<!-- Lock screen -->
<div class="pos-lock" id="lock">
  <div class="pos-lock-card">
    <div class="pos-lock-mark">Q</div>
    <h2>Qahwa POS</h2>
    <div class="pos-lock-sub">Enter your staff PIN</div>
    <div class="pos-lock-display" id="l-display">····</div>
    <div class="pos-keypad" id="l-keypad"></div>
    <div class="pos-lock-error" id="l-error"></div>
    <div class="pos-lock-pickers" id="l-pickers"></div>
  </div>
</div>

<script src="js/data.js?v=20260516a"></script>
<script src="js/mock-api.js?v=20260516a"></script>
<script src="js/notifications.js?v=20260516a"></script>
<script src="js/app.js?v=20260516a"></script>
<script src="js/terminal.js?v=20260516a"></script>
</body>
</html>
