<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#16314f" />
<title>My account - Anvil Supply Co.</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2316314f'/%3E%3Ctext x='50%25' y='66%25' text-anchor='middle' font-family='JetBrains Mono,monospace' font-weight='700' font-size='38' fill='%23fff'%3EA%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/shop.css" />
<style>
  .acct-layout { display: grid; grid-template-columns: 220px 1fr; gap: 22px; margin-top: 18px; align-items: flex-start; }
  .acct-side { position: sticky; top: 110px; }
  .acct-tabs { display: flex; flex-direction: column; gap: 2px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 6px; }
  .acct-tab { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--r-sm); font-size: 13.5px; font-weight: 500; color: var(--ink-2); text-decoration: none; }
  .acct-tab:hover { background: var(--surface-2); color: var(--ink); }
  .acct-tab.active { background: var(--navy-soft); color: var(--navy); font-weight: 600; }
  .acct-tab-icon { width: 18px; text-align: center; opacity: 0.85; }
  .acct-main { min-width: 0; }
  .acct-panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 22px; }
  .acct-panel-title { font-size: 22px; margin-bottom: 14px; }
  @media (max-width: 1020px) {
    .acct-layout { grid-template-columns: 1fr; }
    .acct-side { position: relative; top: 0; }
    .acct-tabs { flex-direction: row; overflow-x: auto; }
    .acct-tab { white-space: nowrap; }
  }
</style>
</head>
<body>

<div id="nav-host"></div>

<main>
  <section class="container" style="padding-top:26px;">
    <h1 style="font-size:clamp(24px,3vw,32px);">My account</h1>
    <p style="color:var(--ink-soft); margin-top:6px;" id="acct-greeting">Loading...</p>
  </section>

  <section class="container" style="padding:18px 22px 60px;">
    <div class="acct-layout">
      <aside class="acct-side">
        <nav class="acct-tabs" id="acct-tabs"></nav>
        <a href="quote-request.html" class="btn btn-orange btn-block btn-sm" style="margin-top:14px;">+ Request a quote</a>
      </aside>
      <div class="acct-main" id="acct-main">
        <div style="padding:40px; text-align:center; color:var(--ink-soft);">Loading...</div>
      </div>
    </div>
  </section>
</main>

<div id="footer-host"></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script src="js/account.js"></script>
<script>window.bootstrapShell('account');</script>

</body>
</html>
