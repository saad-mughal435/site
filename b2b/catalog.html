<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#16314f" />
<title>Catalog - Anvil Supply Co.</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2316314f'/%3E%3Ctext x='50%25' y='66%25' text-anchor='middle' font-family='JetBrains Mono,monospace' font-weight='700' font-size='38' fill='%23fff'%3EA%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/shop.css" />
</head>
<body>

<div id="nav-host"></div>

<main>
  <section class="container" style="padding-top:28px;">
    <h1 id="catalog-heading">Full catalog</h1>
    <p style="color:var(--ink-soft); margin-top:6px;" id="catalog-sub">Loading...</p>
  </section>

  <section class="container" style="padding:18px 22px 60px;">
    <div class="bulk-add">
      <h4>Bulk add by SKU</h4>
      <p>Paste a list (one per line: <code>SKU, qty</code>). We'll match against the catalog and add everything to your cart.</p>
      <textarea id="bulk-input" placeholder="BR-6204, 10&#10;BX-1812, 4&#10;DG-5L, 2"></textarea>
      <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" id="bulk-preview">Preview matches</button>
        <button class="btn btn-orange btn-sm" id="bulk-add-cart" disabled>Add matched to cart</button>
        <span id="bulk-summary" style="font-size:12.5px; color:var(--ink-soft); align-self:center; margin-left:auto;"></span>
      </div>
      <div id="bulk-results" class="bulk-results"></div>
    </div>

    <div class="catalog-head">
      <div class="catalog-meta" id="catalog-count">Loading...</div>
      <div style="display:flex; gap:10px; align-items:center;">
        <label style="font-size:12px; color:var(--ink-soft);">Sort</label>
        <select class="filter-input" id="sort-select" style="width:auto;">
          <option value="sku">SKU</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="stock">Stock</option>
        </select>
        <div class="view-toggle" id="view-toggle">
          <button data-view="table" class="active">Table</button>
          <button data-view="grid">Grid</button>
        </div>
      </div>
    </div>

    <div class="catalog-layout">
      <aside class="filters" id="filters"></aside>
      <div id="catalog-body"></div>
    </div>
  </section>
</main>

<div id="footer-host"></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script src="js/catalog.js"></script>
<script>window.bootstrapShell('catalog');</script>

</body>
</html>
