<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#16314f" />
<title>Checkout - Anvil Supply Co.</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2316314f'/%3E%3Ctext x='50%25' y='66%25' text-anchor='middle' font-family='JetBrains Mono,monospace' font-weight='700' font-size='38' fill='%23fff'%3EA%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/shop.css" />
</head>
<body>

<div id="nav-host"></div>

<main>
  <section class="container" style="padding-top:24px;">
    <h1>Checkout</h1>
    <p style="color:var(--ink-soft); margin-top:4px; font-size:13.5px;">Demo only. No real order is created and nothing is shipped.</p>
  </section>

  <section class="container" style="padding-bottom:60px;">
    <div class="checkout-layout">
      <div class="checkout-main">
        <ol class="checkout-steps" id="steps">
          <li class="active" data-pill="1"><span class="step-num">1</span> Order details</li>
          <li data-pill="2"><span class="step-num">2</span> Approval &amp; terms</li>
          <li data-pill="3"><span class="step-num">3</span> Review</li>
        </ol>
        <div id="checkout-content">
          <div style="padding:40px 0; text-align:center; color:var(--ink-soft);">Loading...</div>
        </div>
      </div>

      <aside class="cart-summary" style="position:sticky; top:110px;">
        <h3>Summary</h3>
        <div id="checkout-summary">Loading...</div>
      </aside>
    </div>
  </section>
</main>

<div id="footer-host"></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/app.js"></script>
<script src="js/checkout.js"></script>
<script>window.bootstrapShell('catalog');</script>

</body>
</html>
