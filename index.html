  <div style="padding:40px 28px; max-width:780px; margin:24px auto; background:#ffffff; border-radius:14px; color:#3a4458; font-family:'Inter',system-ui,sans-serif; line-height:1.6;">

    <p style="font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:#c0341a; margin:0 0 12px;">● Currently available in the UAE · Open to relocate worldwide</p>

    <h1 style="font-family:'Fraunces','Georgia',serif; font-weight:500; color:#1b1712; font-size:40px; letter-spacing:-0.02em; margin:0 0 6px;">Muhammad Saad</h1>
    <h2 style="color:#4a4338; font-size:18px; font-weight:600; margin:0 0 18px;">Automation &amp; Software Developer building ERP systems, dashboards, and web applications</h2>

    <p>I build software that removes manual work from factory operations - production planning, OEE, QC records, batch tracking, inventory, Sage integration, Excel automation and PDF reporting. My advantage is understanding both operations and software: I can run and support Krones beverage production lines, coordinate operators during shifts, and build the external system that tracks downtime, stores production data, and lands a daily report in the GM&rsquo;s inbox. The software is around the production workflow - I don&rsquo;t modify the Krones machine automation itself.</p>

    <p>Currently based in the UAE and open to relocate worldwide for engineering, automation, industrial maintenance, IT operations, or manufacturing software roles.</p>

    <h3 style="color:#1b1712; margin:24px 0 8px; font-size:16px;">Featured manufacturing system</h3>
    <ul style="padding-left:18px; margin:0 0 18px;">
      <li><strong>Kingsley MES / ERP / OEE platform</strong> - sole developer. One operations platform replacing Excel + paper across <em>production planning, QC seam-check, batch tracking + expiry, inventory + FIFO, dispatch, accounts, Sage Evolution integration, OEE monitoring</em>, and 6 print-ready PDF document templates. Python · FastAPI · MongoDB · SQL Server · Docker · Nginx · React. <a href="demo.html" style="color:#2c4f8f;">Walkthrough →</a> · <a href="app/index.html" style="color:#2c4f8f;">Live app →</a></li>
    </ul>

    <h3 style="color:#1b1712; margin:18px 0 8px; font-size:16px;">Other software demos</h3>
    <ul style="padding-left:18px; margin:0 0 18px;">
      <li><strong>ShopFloor API</strong> - MES/OEE backend in Java / Spring Boot 3 (open source, CI-tested). Job orders that compute OEE on close, downtime + root-cause logging, QC holds, FIFO inventory; JWT role-based auth, PostgreSQL + Flyway, OpenAPI/Swagger, Docker. <a href="https://github.com/saad-mughal435/shopfloor-api" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>playwright-e2e</strong> - cross-browser Playwright + TypeScript E2E / API / accessibility test suite for this site and the ShopFloor API; runs on Chromium, Firefox, WebKit and mobile emulation, green in GitHub Actions CI. <a href="https://github.com/saad-mughal435/playwright-e2e" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>n8n-nodes-devtools</strong> - open-source n8n community node in TypeScript, published on npm. JWT sign/verify (HS256/RS256), hashing + HMAC, UUID/Nano ID, JSON↔CSV, base64, regex extraction; pure unit-tested logic, green GitHub Actions CI. <a href="https://www.npmjs.com/package/@saadmughal435/n8n-nodes-devtools" style="color:#2c4f8f;">npm →</a> · <a href="https://github.com/saad-mughal435/n8n-nodes-devtools" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>hft-orderbook</strong> - low-latency C++17 HFT trading-infrastructure engine: reconstructs multi-symbol order books from real NASDAQ TotalView-ITCH 5.0 over BinaryFILE files and the MoldUDP64 UDP feed (sequence-gap detection), with a lock-free SPSC pipeline sharded across cores (ThreadSanitizer-validated, sub-microsecond/msg), a benchmarked pluggable level store (incl. a price-tick-indexed windowed array), microstructure signals + a VWAP/OHLCV tape, a FIX 4.4 order-entry codec, a dependency-free WebSocket L2 viewer, and a MetaTrader 5 bridge; ASan/UBSan + libFuzzer + clang -Werror in CI. <a href="https://github.com/saad-mughal435/hft-orderbook" style="color:#2c4f8f;">GitHub →</a> · <a href="/hft-book/viewer.html" style="color:#2c4f8f;">live L2 viewer →</a></li>
      <li><strong>oee-core</strong> - C++17 OEE (Availability × Performance × Quality) and downtime / MTTR / MTBF analytics library + CLI; CMake, Catch2 tests, green CI. <a href="https://github.com/saad-mughal435/oee-core" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>threadpool</strong> - header-only C++17 thread pool: std::future results, exception propagation, drain-on-destruct; CMake, Catch2 tests, green CI. <a href="https://github.com/saad-mughal435/threadpool" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>netlat</strong> - C++17 TCP connect-latency probe (p50 / p95 / p99 + jitter) over POSIX sockets; CMake, Catch2 tests, green CI. <a href="https://github.com/saad-mughal435/netlat" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>modbus-codec</strong> - C++17 Modbus RTU/TCP frame codec (CRC-16, MBAP, function codes + exceptions); CMake, Catch2 tests, green CI. <a href="https://github.com/saad-mughal435/modbus-codec" style="color:#2c4f8f;">GitHub →</a></li>
      <li><strong>Anvil Supply Co.</strong> - B2B wholesale portal demo. Tier pricing, MOQ, contract discounts, quote workflow, approval workflow for orders over $1,000, admin with order/quote/approval queues. <a href="b2b/index.html" style="color:#2c4f8f;">Open →</a></li>
      <li><strong>Manzil Properties</strong> - Dubai real-estate marketplace demo. Map + list search, agent profiles, mortgage / valuation / yield calculators, 15-section admin SPA. <a href="property/index.html" style="color:#2c4f8f;">Open →</a></li>
      <li><strong>Vacation Homes</strong> - UAE short-stay booking demo. Hand-rolled date-range picker, conflict-checked bookings, 6-step host onboarding wizard with document upload, admin verification queue. <a href="vacation/index.html" style="color:#2c4f8f;">Open →</a></li>
      <li><strong>Qahwa POS</strong> - café / quick-service POS demo. Touch cashier terminal, kitchen display, modifier-driven menus, shift cash reconciliation with Z-reports, 14-section admin. <a href="pos/index.html" style="color:#2c4f8f;">Open →</a></li>

</button>
<script>
(function () {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  var threshold = 280;
  var ticking = false;
  function scrollY() {
    return window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }
  function update() {
    btn.classList.toggle('visible', scrollY() > threshold);
    ticking = false;
  }
  function onScroll() {
    if (!ticking) { requestAnimationFrame(update); ticking = true; }
  }
  // Listen on both window and document so we catch scroll regardless of root.
  window.addEventListener('scroll', onScroll, { passive: true });
  document.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll, { passive: true });
  btn.addEventListener('click', function () {
    var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    } else if (window.scrollTo) {
      try { window.scrollTo({ top: 0, behavior: 'smooth' }); }
      catch (e) { window.scrollTo(0, 0); }
    }
    btn.blur();
  });
  update();
})();
</script>
