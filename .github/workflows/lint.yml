# Real checks that really fail. Rationale for what is NOT here:
#  - prettier: the site is hand-formatted (CRLF, deliberate spacing); a format
#    checker would fail by design, and a swallowed failure is worse than none.
#  - the stylistic html-validate rules disabled in .htmlvalidate.json are
#    deliberate site choices (inline styles in the noscript fallback, div-in-
#    button in the demo mock shells); structural and a11y rules stay on.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  js-syntax:
    name: JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: node --check every served script
        run: |
          set -e
          find . -name '*.js' -not -path './node_modules/*' -not -path './src/*' \
            -not -path './dist/*' -not -name '*.min.js' -print0 \
            | xargs -0 -n1 node --check
          echo "all scripts parse"

  html-validate:
    name: HTML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install html-validate
        run: npm install --no-save html-validate@^9
      - name: Validate shell pages, notes and the L2 viewer
        run: >
          npx html-validate
          index.html src/contact.html src/demo.html src/404.html
          src/notes/index.html src/notes/itch-orderbook-reconstruction.html
          src/notes/shopfloor-oee-engine.html src/notes/krones-operations-software.html
          hft-book/viewer.html

  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      # The shell pages cross-link each other, and since wave 1 of the v6
      # migration some of them only exist in the built output - so build
      # dist/ and link-check that instead of the source tree.
      - run: npm ci
      - run: npm run build
      - name: Check internal links (failures fail the job)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir ${{ github.workspace }}/dist "dist/*.html" "dist/*.md"
          fail: true
