# Real checks that really fail. Rationale for what is NOT here:
#  - prettier: the site is hand-formatted (CRLF, deliberate spacing); a format
#    checker would fail by design, and a swallowed failure is worse than none.
#  - the stylistic html-validate rules disabled in .htmlvalidate.json are
#    deliberate site choices (inline styles in the noscript fallback, div-in-
#    button in the demo mock shells); structural and a11y rules stay on.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  js-syntax:
    name: JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check every served script
        run: |
          set -e
          find . -name '*.js' -not -path './node_modules/*' -not -name '*.min.js' -print0 \
            | xargs -0 -n1 node --check
          echo "all scripts parse"

  html-validate:
    name: HTML validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install html-validate
        run: npm install --no-save html-validate@^9
      - name: Validate shell pages, notes and the L2 viewer
        run: >
          npx html-validate
          index.html contact.html demo.html 404.html
          notes/index.html notes/itch-orderbook-reconstruction.html
          notes/shopfloor-oee-engine.html notes/krones-operations-software.html
          hft-book/viewer.html

  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal links (failures fail the job)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir ${{ github.workspace }} "*.html" "*.md"
          fail: true
