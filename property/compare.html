<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compare listings — Manzil</title>
<meta name="description" content="Compare up to 3 properties side by side — price, beds, baths, size, amenities, agent and listed date." />
<meta name="theme-color" content="#1f7a55" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2064%2064'%3E%3Crect%20width%3D'64'%20height%3D'64'%20rx%3D'14'%20fill%3D'%231f7a55'/%3E%3Ctext%20x%3D'50%25'%20y%3D'58%25'%20font-family%3D'serif'%20font-weight%3D'700'%20font-size%3D'30'%20fill%3D'%23c9a049'%20text-anchor%3D'middle'%3Eم%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/property.css?v=20260514" />
</head>
<body class="manzil">
<div data-shell-nav></div>

<section class="m-container m-section">
  <span class="m-eyebrow">Side-by-side</span>
  <h1>Compare listings.</h1>
  <p class="m-text-muted">Up to 3 listings. Add ⊕ from any listing detail page.</p>

  <div id="compare-host" class="m-mt-3"></div>
</section>

<div data-shell-foot></div>

<script src="js/data.js"></script>
<script src="js/mock-api.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
<script>
ManzilApp.mountShell('compare');

var d = MANZIL_DATA;

function render() {
  ManzilApp.api('/compare').then(function (r) {
    var items = r.items;
    var host = document.getElementById('compare-host');
    if (!items.length) {
      host.innerHTML = ''
        + '<div class="m-empty">'
        +   '<div class="m-empty-icon">⊕</div>'
        +   '<h3>No listings to compare</h3>'
        +   '<p>Open any listing and click <strong>⊕ Compare</strong>. You can add up to 3.</p>'
        +   '<a class="m-btn m-btn--primary" href="search.html">Browse listings →</a>'
        + '</div>';
      return;
    }
    var rows = items.map(function (l) { return l; });
    var allAmen = Array.from(new Set(rows.flatMap(function (l) { return l.amenities || []; })));

    var html = '<div style="overflow-x:auto;"><table class="m-compare-table">';
    html += '<tr><th></th>' + rows.map(function (l) {
      return '<td>'
        + '<img src="' + (l.photos && l.photos[0]) + '" alt="" />'
        + '<button class="m-btn m-btn--ghost m-btn--sm m-mt-1" onclick="removeOne(\'' + l.id + '\')">× Remove</button>'
        + '</td>';
    }).join('') + '</tr>';
    function row(label, fn) {
      return '<tr><th>' + label + '</th>' + rows.map(function (l) { return '<td>' + fn(l) + '</td>'; }).join('') + '</tr>';
    }
    html += row('Title',     function (l) { return '<a href="listing.html?id=' + l.id + '">' + l.title + '</a>'; });
    html += row('Price',     function (l) { return '<strong>' + ManzilApp.formatPriceExact(l.price_aed) + '</strong>'; });
    html += row('AED / ft²', function (l) { return 'AED ' + Math.round(l.price_aed / l.sqft).toLocaleString(); });
    html += row('Beds',      function (l) { return l.beds || 'Studio'; });
    html += row('Baths',     function (l) { return l.baths; });
    html += row('Size',      function (l) { return l.sqft.toLocaleString() + ' ft²'; });
    html += row('Type',      function (l) { return l.type[0].toUpperCase() + l.type.slice(1); });
    html += row('Year built',function (l) { return l.year_built; });
    html += row('Status',    function (l) { return l.completion_status === 'ready' ? 'Ready' : 'Off-plan'; });
    html += row('Furnished', function (l) { return l.furnished ? '✓' : '—'; });
    html += row('Area',      function (l) { var a = d.AREAS.find(function (x) { return x.id === l.area_id; }); return a ? a.name : ''; });
    html += row('Listed',    function (l) { return ManzilApp.fmtDate(l.listed_at); });
    html += row('Agent',     function (l) { var a = d.AGENTS.find(function (x) { return x.id === l.agent_id; }); return a ? a.name : ''; });
    allAmen.forEach(function (id) {
      var a = d.AMENITIES.find(function (x) { return x.id === id; });
      if (!a) return;
      html += row(a.icon + ' ' + a.label, function (l) { return (l.amenities || []).indexOf(id) !== -1 ? '<span style="color:var(--manzil-primary)">✓</span>' : '<span style="color:#bbb">—</span>'; });
    });
    html += '</table></div>';
    host.innerHTML = html;
  });
}
window.removeOne = function (id) {
  ManzilApp.api('/compare', { method: 'POST', body: { action: 'remove', id: id } }).then(render);
};
render();
</script>
</body>
</html>
