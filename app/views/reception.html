<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reception - Demo Plant LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; }
        input, select, textarea {
            font-size: 16px !important; /* prevents iOS zoom on focus */
        }
        .card-hover { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .card-hover:active { transform: scale(0.97); }
        .photo-preview { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 0.75rem; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #1e293b; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- ========== SCREEN 1: CATEGORY SELECTION ========== -->
    <div id="screen-category" class="w-full max-w-2xl fade-in">
        <div class="text-center mb-10">
            <img src="/app/demo-logo.svg" alt="Demo Plant" class="h-16 mx-auto mb-4 rounded-xl shadow" onerror="this.style.display='none'">
            <h1 class="text-3xl font-bold text-slate-800">Welcome to Demo Plant</h1>
            <p class="text-slate-500 text-lg mt-2">Please select your visit type</p>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <!-- Visitor Card -->
            <button onclick="showScreen('visitor')" class="card-hover bg-white rounded-2xl shadow-lg p-8 flex flex-col items-center text-center border-2 border-transparent hover:border-slate-800 focus:border-slate-800 outline-none">
                <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center mb-5">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
                </div>
                <span class="text-2xl font-semibold text-slate-800">Visitor</span>
                <span class="text-slate-400 mt-2 text-base">Guest or meeting attendee</span>
            </button>

            <!-- Courier Card -->
            <button onclick="showScreen('courier')" class="card-hover bg-white rounded-2xl shadow-lg p-8 flex flex-col items-center text-center border-2 border-transparent hover:border-slate-800 focus:border-slate-800 outline-none">
                <div class="w-20 h-20 bg-amber-50 rounded-2xl flex items-center justify-center mb-5">
                    <svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg>
                </div>
                <span class="text-2xl font-semibold text-slate-800">Courier</span>
                <span class="text-slate-400 mt-2 text-base">Delivery or pickup</span>
            </button>
        </div>

        <p class="text-center mt-10 text-slate-400 text-sm">&copy; 2026 Demo Plant LLC</p>
    </div>

    <!-- ========== SCREEN 2A: VISITOR FORM ========== -->
    <div id="screen-visitor" class="w-full max-w-2xl hidden fade-in">
        <div class="flex items-center mb-6">
            <button onclick="showScreen('category')" class="mr-4 w-12 h-12 flex items-center justify-center rounded-xl bg-white shadow hover:bg-slate-50 active:scale-95 transition">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
            </button>
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Visitor Registration</h2>
                <p class="text-slate-400 text-sm">Please fill in your details</p>
            </div>
        </div>

        <form id="visitor-form" class="bg-white rounded-2xl shadow-lg p-6 space-y-5" onsubmit="return submitVisitor(event)">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Full Name <span class="text-red-400">*</span></label>
                    <input type="text" name="full_name" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="Enter your full name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Company / Organization <span class="text-red-400">*</span></label>
                    <input type="text" name="company" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="Your company name">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Designation <span class="text-red-400">*</span></label>
                    <input type="text" name="designation" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="Your job title">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Purpose of Visit <span class="text-red-400">*</span></label>
                    <input type="text" name="purpose_of_visit" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="e.g. Business meeting">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Allergies</label>
                    <input type="text" name="allergies" autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="None">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Health Conditions</label>
                    <input type="text" name="health_conditions" autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="None">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Contact Number <span class="text-red-400">*</span></label>
                    <input type="tel" name="contact_number" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="+971 XX XXX XXXX">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Email Address <span class="text-slate-400 font-normal">(optional)</span></label>
                    <input type="email" name="email" autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="email@example.com">
                </div>
            </div>

            <!-- ID Photo Capture -->
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-3">Identification Document <span class="text-red-400">*</span></label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <input type="file" id="visitor-id-front" name="id_front" accept="image/*" capture="environment" required onchange="previewPhoto(this, 'visitor-front-preview')">
                        <label for="visitor-id-front" id="visitor-front-label" class="cursor-pointer block border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:border-slate-400 transition">
                            <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/></svg>
                            <span class="text-sm font-medium text-slate-500">ID Front</span>
                            <span class="text-xs text-slate-400 block mt-1">Tap to capture</span>
                        </label>
                        <img id="visitor-front-preview" class="photo-preview hidden mt-2" alt="ID Front">
                    </div>
                    <div>
                        <input type="file" id="visitor-id-back" name="id_back" accept="image/*" capture="environment" required onchange="previewPhoto(this, 'visitor-back-preview')">
                        <label for="visitor-id-back" id="visitor-back-label" class="cursor-pointer block border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:border-slate-400 transition">
                            <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/></svg>
                            <span class="text-sm font-medium text-slate-500">ID Back</span>
                            <span class="text-xs text-slate-400 block mt-1">Tap to capture</span>
                        </label>
                        <img id="visitor-back-preview" class="photo-preview hidden mt-2" alt="ID Back">
                    </div>
                </div>
            </div>

            <!-- Error -->
            <div id="visitor-error" class="hidden p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm"></div>

            <button type="submit" id="visitor-submit-btn"
                class="w-full bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-white font-semibold py-4 px-6 rounded-xl transition text-lg">
                Submit
            </button>
        </form>
    </div>

    <!-- ========== SCREEN 2B: COURIER FORM ========== -->
    <div id="screen-courier" class="w-full max-w-2xl hidden fade-in">
        <div class="flex items-center mb-6">
            <button onclick="showScreen('category')" class="mr-4 w-12 h-12 flex items-center justify-center rounded-xl bg-white shadow hover:bg-slate-50 active:scale-95 transition">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
            </button>
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Courier Registration</h2>
                <p class="text-slate-400 text-sm">Log the delivery details</p>
            </div>
        </div>

        <form id="courier-form" class="bg-white rounded-2xl shadow-lg p-6 space-y-5" onsubmit="return submitCourier(event)">
            <!-- Date (auto) -->
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">Date</label>
                <div id="courier-date" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-medium"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Recipient Name <span class="text-red-400">*</span></label>
                    <input type="text" name="recipient_name" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="Person receiving the courier">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Courier Type <span class="text-red-400">*</span></label>
                    <select name="courier_type" required
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800 bg-white">
                        <option value="" disabled selected>Select type</option>
                        <option value="Document">Document</option>
                        <option value="Package">Package</option>
                        <option value="Parcel">Parcel</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Courier Company <span class="text-red-400">*</span></label>
                    <input type="text" name="courier_company" required autocomplete="off" list="courier-companies"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="e.g. DHL, FedEx">
                    <datalist id="courier-companies">
                        <option value="DHL">
                        <option value="FedEx">
                        <option value="Aramex">
                        <option value="UPS">
                        <option value="SMSA">
                        <option value="Emirates Post">
                    </datalist>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Representative Name <span class="text-red-400">*</span></label>
                    <input type="text" name="representative_name" required autocomplete="off"
                        class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800"
                        placeholder="Courier person's name">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">Representative Contact Number <span class="text-red-400">*</span></label>
                <input type="tel" name="representative_contact" required autocomplete="off"
                    class="w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition text-slate-800 max-w-sm"
                    placeholder="+971 XX XXX XXXX">
            </div>

            <!-- ID Photo Capture -->
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-3">Identification Document <span class="text-red-400">*</span></label>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <input type="file" id="courier-id-front" name="id_front" accept="image/*" capture="environment" required onchange="previewPhoto(this, 'courier-front-preview')">
                        <label for="courier-id-front" id="courier-front-label" class="cursor-pointer block border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:border-slate-400 transition">
                            <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/></svg>
                            <span class="text-sm font-medium text-slate-500">ID Front</span>
                            <span class="text-xs text-slate-400 block mt-1">Tap to capture</span>
                        </label>
                        <img id="courier-front-preview" class="photo-preview hidden mt-2" alt="ID Front">
                    </div>
                    <div>
                        <input type="file" id="courier-id-back" name="id_back" accept="image/*" capture="environment" required onchange="previewPhoto(this, 'courier-back-preview')">
                        <label for="courier-id-back" id="courier-back-label" class="cursor-pointer block border-2 border-dashed border-slate-300 rounded-xl p-6 text-center hover:border-slate-400 transition">
                            <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z"/></svg>
                            <span class="text-sm font-medium text-slate-500">ID Back</span>
                            <span class="text-xs text-slate-400 block mt-1">Tap to capture</span>
                        </label>
                        <img id="courier-back-preview" class="photo-preview hidden mt-2" alt="ID Back">
                    </div>
                </div>
            </div>

            <!-- Error -->
            <div id="courier-error" class="hidden p-4 bg-red-50 border border-red-200 text-red-600 rounded-xl text-sm"></div>

            <button type="submit" id="courier-submit-btn"
                class="w-full bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-white font-semibold py-4 px-6 rounded-xl transition text-lg">
                Submit
            </button>
        </form>
    </div>

    <!-- ========== SCREEN 3: SUCCESS ========== -->
    <div id="screen-success" class="w-full max-w-xl hidden fade-in text-center">
        <div class="bg-white rounded-2xl shadow-lg p-10">
            <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-14 h-14 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Thank You!</h2>
            <p id="success-message" class="text-slate-500 text-lg mb-6">Your details have been recorded.</p>
            <p class="text-slate-400 text-sm">Returning to the home screen in <span id="countdown" class="font-semibold text-slate-600">5</span> seconds...</p>
        </div>
    </div>

    <!-- ========== LOADING OVERLAY ========== -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 flex flex-col items-center">
            <div class="spinner mb-4"></div>
            <p class="text-slate-600 font-medium">Submitting...</p>
        </div>
    </div>

<script>
    const screens = ['category', 'visitor', 'courier', 'success'];
    let countdownTimer = null;

    function showScreen(name) {
        screens.forEach(s => {
            const el = document.getElementById('screen-' + s);
            if (el) {
                el.classList.add('hidden');
                el.classList.remove('fade-in');
            }
        });
        const target = document.getElementById('screen-' + name);
        if (target) {
            target.classList.remove('hidden');
            void target.offsetWidth;
            target.classList.add('fade-in');
        }

        if (name === 'courier') {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('courier-date').textContent = now.toLocaleDateString('en-AE', options);
        }

        if (name === 'category') {
            resetForms();
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForms() {
        document.getElementById('visitor-form').reset();
        document.getElementById('courier-form').reset();
        ['visitor-front-preview', 'visitor-back-preview', 'courier-front-preview', 'courier-back-preview'].forEach(id => {
            const img = document.getElementById(id);
            img.classList.add('hidden');
            img.src = '';
        });
        ['visitor-front-label', 'visitor-back-label', 'courier-front-label', 'courier-back-label'].forEach(id => {
            document.getElementById(id).classList.remove('hidden');
        });
        ['visitor-error', 'courier-error'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
    }

    function previewPhoto(input, previewId) {
        const preview = document.getElementById(previewId);
        const labelId = input.id.replace('id-front', 'front-label').replace('id-back', 'back-label');
        const label = document.getElementById(labelId);
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                if (label) label.classList.add('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function showLoading(show) {
        document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    }

    function showError(formType, message) {
        const el = document.getElementById(formType + '-error');
        el.textContent = message;
        el.classList.remove('hidden');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function startSuccessCountdown(message) {
        document.getElementById('success-message').textContent = message;
        showScreen('success');
        let remaining = 5;
        document.getElementById('countdown').textContent = remaining;
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            remaining--;
            document.getElementById('countdown').textContent = remaining;
            if (remaining <= 0) {
                clearInterval(countdownTimer);
                showScreen('category');
            }
        }, 1000);
    }

    async function submitVisitor(e) {
        e.preventDefault();
        const form = document.getElementById('visitor-form');
        const fd = new FormData(form);

        if (!fd.get('id_front') || !fd.get('id_front').size) { showError('visitor', 'Please capture the front of your ID.'); return false; }
        if (!fd.get('id_back') || !fd.get('id_back').size) { showError('visitor', 'Please capture the back of your ID.'); return false; }

        showLoading(true);
        try {
            const res = await fetch('/api/reception/visitor', { method: 'POST', body: fd });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Submission failed');
            showLoading(false);
            startSuccessCountdown('Visitor registration complete. Welcome!');
        } catch (err) {
            showLoading(false);
            showError('visitor', err.message);
        }
        return false;
    }

    async function submitCourier(e) {
        e.preventDefault();
        const form = document.getElementById('courier-form');
        const fd = new FormData(form);

        if (!fd.get('id_front') || !fd.get('id_front').size) { showError('courier', 'Please capture the front of the ID.'); return false; }
        if (!fd.get('id_back') || !fd.get('id_back').size) { showError('courier', 'Please capture the back of the ID.'); return false; }

        showLoading(true);
        try {
            const res = await fetch('/api/reception/courier', { method: 'POST', body: fd });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Submission failed');
            showLoading(false);
            startSuccessCountdown('Courier delivery logged successfully.');
        } catch (err) {
            showLoading(false);
            showError('courier', err.message);
        }
        return false;
    }

    showScreen('category');
</script>
</body>
</html>
